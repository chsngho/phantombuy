<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phantom Buy — Phantom Shopping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* Phantom of the Opera Theme: Ice White, Dark Navy, Ice Blue */
    --bg-mist: #F0F2F6; /* Ice white phone base */
    --surface: #FFFFFF;
    --ink: #0B132B; /* Dark Navy text */
    --ink-soft: #485675;
    --coin: #00B4D8; /* Vibrant ice blue accent */
    --coin-deep: #0077B6; /* Deeper ice blue */
    --mint: #00B4D8; 
    --mint-soft: #EDF6F9; /* Very pale ice blue for backgrounds */
    --line: #CDD7E2;
    --warn: #0077B6;
    --lav: #A5C4D4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Plus Jakarta Sans',sans-serif;
    /* Dark Navy/Slate outer background */
    background: #1C2331; 
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:28px 12px;
    color:var(--ink);
  }
  .phone{
    width:390px;
    max-width:100%;
    height:780px;
    background:var(--bg-mist);
    border-radius:38px;
    box-shadow:0 30px 60px -20px rgba(11,19,43,0.6), 0 0 0 10px #090E17;
    overflow:hidden;
    position:relative;
    display:flex;flex-direction:column;
  }
  .statusbar{
    height:30px;flex:0 0 30px;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);
  }
  .topbar{
    flex:0 0 auto;padding:12px 20px 14px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(11, 19, 43, 0.05);
  }
  
  /* Phantom Buy Logo */
  .wordmark{
    display:flex;
    align-items:center;
    gap:4px;
    user-select:none;
  }
  .wordmark .brand-phantom {
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:23px;
    color:var(--ink);
    letter-spacing:-0.5px;
  }
  .wordmark .brand-buy {
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:800;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--surface);
    background:var(--coin-deep);
    padding:3px 8px;
    border-radius:6px;
    display:inline-block;
  }

  .coinpill{
    display:flex;align-items:center;gap:6px;
    background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:6px 12px;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:500;
    cursor:pointer;
  }
  .coinpill .dot{width:8px;height:8px;border-radius:50%;background:var(--coin);}
  .screen{
    flex:1;overflow-y:auto;padding:4px 18px 90px;
    scrollbar-width:none;
  }
  .screen::-webkit-scrollbar{display:none;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);margin:14px 0 6px;}
  h1.pagetitle{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:0 0 4px;letter-spacing:-0.3px;}
  .sub{color:var(--ink-soft);font-size:13.5px;margin:0 0 16px;line-height:1.5;}
  .chiprow{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;}
  .chip{
    flex:0 0 auto;background:var(--surface);border:1px solid var(--line);
    padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;
  }
  .chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .card{
    background:var(--surface);border-radius:18px;padding:12px;
    border:1px solid var(--line);cursor:pointer;
    transition:transform .12s ease;
  }
  .card:active{transform:scale(0.97);}
  .thumb{
    width:100%;aspect-ratio:1/1;border-radius:14px;
    display:flex;align-items:center;justify-content:center;font-size:38px;
    margin-bottom:10px;
    background: var(--mint-soft);
  }
  .pname{font-size:13.5px;font-weight:600;margin:0 0 2px;line-height:1.3;}
  .pcat{font-size:11px;color:var(--ink-soft);margin:0 0 8px;}
  .pprice{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:var(--coin-deep);display:flex;align-items:center;gap:4px;}
  .receipt{
    background:var(--surface);border-radius:16px;border:1px solid var(--line);
    padding:16px;position:relative;margin-bottom:14px;
  }
  .receipt::after{
    content:"";position:absolute;left:0;right:0;bottom:-1px;height:10px;
    background-image:radial-gradient(circle at 8px 0, transparent 8px, var(--bg-mist) 9px);
    background-size:16px 10px;background-repeat:repeat-x;
  }
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .btn{
    width:100%;border:none;border-radius:14px;padding:15px;
    font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14.5px;
    cursor:pointer;text-align:center;
  }
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:disabled{background:#A2B2C2;cursor:not-allowed;}
  .btn[disabled]{opacity:0.55;cursor:not-allowed;}
  .btn-mint{background:var(--mint);color:#0B132B;}
  .btn-ghost{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
  .btn-warn{background:var(--warn);color:#fff;}
  .btn-sm{padding:9px 14px;font-size:12.5px;border-radius:10px;width:auto;}
  .backrow{display:flex;align-items:center;gap:10px;margin:8px 0 10px;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:600;}
  .stamp{
    width:150px;height:150px;margin:14px auto 6px;position:relative;
  }
  .stamp svg{width:100%;height:100%;}
  .timeline{margin:18px 0;}
  .tl-item{display:flex;gap:12px;padding-bottom:22px;position:relative;}
  .tl-item::before{content:"";position:absolute;left:9px;top:22px;bottom:0;width:2px;background:var(--line);}
  .tl-item:last-child::before{display:none;}
  .tl-dot{width:20px;height:20px;border-radius:50%;flex:0 0 20px;display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--line);color:transparent;}
  .tl-dot.done{background:var(--mint);color:#0B132B;}
  .tl-label{font-weight:700;font-size:13.5px;}
  .tl-time{font-size:11.5px;color:var(--ink-soft);margin-top:1px;}
  .notif{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:10px 12px;font-size:12px;margin-bottom:8px;display:flex;gap:8px;align-items:flex-start;
  }
  .vaultcard{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;}
  .ring{width:44px;height:44px;flex:0 0 44px;}
  .empty{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty .e-emoji{font-size:36px;margin-bottom:10px;}
  .navbar{
    position:absolute;left:0;right:0;bottom:0;height:74px;
    background:rgba(240, 242, 246, 0.88);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-around;
    padding-bottom:10px;
  }
  .navitem{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--ink-soft);font-size:10px;font-weight:600;position:relative;}
  .navitem.active{color:var(--ink);}
  .navitem .ic{font-size:19px;}
  .badge{
    position:absolute;top:-4px;right:-10px;background:var(--coin);color:#fff;
    font-size:9px;font-weight:700;border-radius:999px;padding:1px 5px;min-width:14px;text-align:center;
  }
  .slider{width:100%;accent-color:var(--ink);}
  .walletcard{background:linear-gradient(135deg,#0B132B,#1A2B4C);color:#fff;border-radius:20px;padding:22px;margin-bottom:16px;}
  .walletcard .lbl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:0.65;}
  .walletcard .bal{font-family:'Fraunces',serif;font-size:38px;font-weight:600;margin:4px 0 10px;}
  .streakwrap{display:flex;gap:5px;margin-top:12px;}
  .streakday{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,0.2);}
  .streakday.on{background:var(--coin);}
  .fieldrow{display:flex;justify-content:space-between;align-items:center;margin:14px 0 4px;font-size:12.5px;font-weight:600;}
  .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--mint);flex:0 0 8px;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.4);}}
  #toastEl{transition:opacity .25s ease;}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:10px;}
  .key{
    aspect-ratio:1;border-radius:50%;background:var(--surface);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:600;
    cursor:pointer;font-family:'IBM Plex Mono',monospace;user-select:none;
  }
  .key:active{background:var(--line);}
  .dots{display:flex;gap:16px;justify-content:center;margin:22px 0 6px;}
  .pdot{width:14px;height:14px;border-radius:50%;border:2px solid var(--ink);background:transparent;transition:background .15s;}
  .pdot.filled{background:var(--ink);}
  .fingerprint-wrap{display:flex;flex-direction:column;align-items:center;margin:36px 0;}
  .fp-circle{
    width:118px;height:118px;border-radius:50%;background:var(--surface);border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:46px;cursor:pointer;
  }
  .fp-circle.scanning{animation:fpscan 1s ease-in-out infinite;border-color:var(--mint);}
  .fp-circle.success{background:var(--mint-soft);border-color:var(--mint);color:#0B132B;}
  @keyframes fpscan{0%,100%{box-shadow:0 0 0 0 rgba(0,180,216,0.45);}50%{box-shadow:0 0 0 16px rgba(0,180,216,0);}}
  .phone.onboarding .topbar,.phone.onboarding .navbar{display:none;}
  .phone.onboarding .screen{padding-bottom:24px;}
  .onb-wrap{display:flex;flex-direction:column;min-height:100%;padding-top:40px;}
  .onb-hero{font-size:52px;text-align:center;margin-bottom:6px;}
  .onb-title{font-family:'Fraunces',serif;font-weight:600;font-size:28px;text-align:center;letter-spacing:-0.3px;margin:6px 0 8px;}
  .onb-sub{color:var(--ink-soft);font-size:13.5px;text-align:center;line-height:1.55;margin:0 24px 28px;}
  .onb-spacer{flex:1;}
  .interest-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
  .interest-card{
    background:var(--surface);border:1.5px solid var(--line);border-radius:16px;
    padding:18px 10px;text-align:center;cursor:pointer;font-weight:700;font-size:13px;
  }
  .interest-card .ic-emoji{font-size:26px;display:block;margin-bottom:8px;}
  .interest-card.selected{border-color:var(--ink);background:var(--mint-soft);}
  .shake{animation:shakeit .4s;}
  @keyframes shakeit{10%,90%{transform:translateX(-4px);}20%,80%{transform:translateX(4px);}30%,70%{transform:translateX(-6px);}40%,60%{transform:translateX(6px);}50%{transform:translateX(-4px);}}
  .skiplink{text-align:center;font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:14px;cursor:pointer;text-decoration:underline;}

  @media (min-width: 860px){
    body{padding:0;align-items:flex-start;}
    .phone{
      width:100%;max-width:720px;height:auto;min-height:100vh;
      border-radius:0;box-shadow:none;overflow:visible;
      background:var(--bg-mist);
    }
    .statusbar{display:none;}
    .topbar{padding:28px 40px 18px;order:0;border-bottom:none;}
    .wordmark .brand-phantom{font-size:30px;}
    .wordmark .brand-buy{font-size:17px;padding:4px 10px;}
    .navbar{
      position:sticky;top:0;order:1;height:auto;
      background:var(--bg-mist);backdrop-filter:none;border-top:none;border-bottom:1px solid var(--line);
      justify-content:flex-start;gap:34px;padding:14px 40px;z-index:10;
    }
    .navitem{flex-direction:row;gap:7px;font-size:13.5px;}
    .navitem .ic{font-size:17px;}
    .screen{order:2;flex:none;overflow:visible;padding:6px 40px 70px;max-width:720px;margin:0 auto;}
    .grid{grid-template-columns:repeat(3,1fr);gap:16px;}
    .interest-grid{grid-template-columns:repeat(4,1fr);}
    h1.pagetitle{font-size:30px;}
    .onb-wrap{padding-top:70px;}
    .keypad{max-width:280px;margin:10px auto 0;}
    .fingerprint-wrap{margin:48px auto;}
  }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span id="clock">9:41</span><span>Phantom Buy Sandbox</span></div>
  <div class="topbar">
    <div class="wordmark" onclick="go('home')" style="cursor:pointer;">
      👻 <span class="brand-phantom">Phantom</span><span class="brand-buy">Buy</span>
    </div>
    <div class="coinpill" onclick="go('wallet')"><span class="dot"></span><span id="coinpillnum"></span> PC</div>
  </div>
  <div class="screen" id="screen"></div>
  <div class="navbar">
    <div class="navitem" data-v="home" onclick="go('home')"><span class="ic">🏬</span>Shop</div>
    <div class="navitem" data-v="cart" onclick="go('cart')" style="position:relative;"><span class="ic">👻</span>Cart<span class="badge" id="cartbadge" style="display:none;"></span></div>
    <div class="navitem" data-v="vault" onclick="go('vault')" style="position:relative;"><span class="ic">🗄️</span>Vault<span class="badge" id="vaultbadge" style="display:none;"></span></div>
    <div class="navitem" data-v="wallet" onclick="go('wallet')"><span class="ic">🪙</span>Wallet</div>
  </div>
</div>

<script>
const PRODUCTS = [
  {id:1,name:"Cloudform Wireless Earbuds",cat:"Gadgets",price:129,emoji:"🎧",blurb:"Noise-isolating buds with a matte-soft case, mid-range ANC performance."},
  {id:2,name:"Iridescent Phone Case",cat:"Gadgets",price:22,emoji:"📱",blurb:"Shifts color in the light. Drop-tested (in the simulation, at least)."},
  {id:3,name:"Woven Watch Band",cat:"Gadgets",price:19,emoji:"⌚",blurb:"Adjustable nylon weave, brushed clasp. Fits most standard lugs."},
  {id:4,name:"Aurora Smartwatch",cat:"Gadgets",price:249,emoji:"⌚",blurb:"Heart-rate, sleep, and GPS tracking with a 2-day battery."},
  {id:5,name:"Portable Bluetooth Speaker",cat:"Gadgets",price:79,emoji:"🔊",blurb:"Water-resistant, 12-hour playtime, surprisingly loud for its size."},
  {id:6,name:"Flagship Smartphone",cat:"Gadgets",price:999,emoji:"📲",blurb:"Latest-gen chip, triple camera, the one everyone's been eyeing."},
  {id:7,name:"Trailrunner Knit Sneakers",cat:"Fashion",price:68,emoji:"👟",blurb:"Breathable knit upper, foam sole. That first-unbox smell, simulated faithfully."},
  {id:8,name:"Oversized Fleece Hoodie",cat:"Fashion",price:54,emoji:"🧥",blurb:"Heavyweight fleece, dropped shoulder. The one you'd wear on a Sunday."},
  {id:9,name:"Polarized Sunglasses",cat:"Fashion",price:89,emoji:"🕶️",blurb:"UV400 protection, spring hinges, a case included."},
  {id:10,name:"Canvas Weekender Backpack",cat:"Fashion",price:65,emoji:"🎒",blurb:"Water-resistant canvas, padded laptop sleeve, room for a weekend."},
  {id:11,name:"Amber Fig Soy Candle",cat:"Home",price:26,emoji:"🕯️",blurb:"40-hour burn, hand-poured. Scent notes: warm fig, cedar, a little vanilla."},
  {id:12,name:"Ceramic Desk Planter",cat:"Home",price:19,emoji:"🪴",blurb:"Speckled glaze, drainage dish included. Pairs well with a small pothos."},
  {id:13,name:"Ribbed Throw Blanket",cat:"Home",price:38,emoji:"🧶",blurb:"Chunky knit, machine washable, oversized for couch-draping."},
  {id:14,name:"Pour-Over Coffee Maker",cat:"Home",price:42,emoji:"☕",blurb:"Glass carafe, reusable filter, the ritual before the caffeine hits."},
  {id:15,name:"Compact Air Fryer",cat:"Home",price:89,emoji:"🍟",blurb:"3.5-quart basket, one-touch presets, fits on a narrow counter."},
  {id:16,name:"Tinted Lip Balm Trio",cat:"Beauty",price:15,emoji:"💄",blurb:"Three shades, sheer finish. Comes in a little card sleeve."},
  {id:17,name:"Niacinamide Serum",cat:"Beauty",price:42,emoji:"🧴",blurb:"10% niacinamide, fragrance-free, the one every routine seems to have."},
  {id:18,name:"Sonic Electric Toothbrush",cat:"Beauty",price:89,emoji:"🪥",blurb:"Rechargeable, 3 modes, a 2-minute built-in timer."},
];
const STAGES = ["Placed","Preparing","Shipped","Out for Delivery","Delivered"];
const STAGE_NOTIFS = [
  "Order confirmed — we're getting it ready.",
  "Your item has been picked and packed at the fulfillment hub.",
  "Package has departed the fulfillment hub.",
  "Out for delivery — arriving today.",
  "Delivered. It's in your Vault now."
];

let state = {
  view:"welcome",
  onboarded:false,
  coins:380,
  streak:2,
  budgetSync:false,
  lastClaimDate:null,
  cart:[],
  orders:[],
  vault:[],
  filter:"All",
  selected:null,
  openOrder:null,
  authMethod:"passcode",
  passcodeInput:"",
  verifying:false,
  authSuccess:false,
  authError:false,
  userPasscode:null,
  setupStage:"enter",
  setupFirst:"",
  setupSecond:"",
  setupError:false,
  interests:[],
};

function fmt(n){ return n.toLocaleString(); }
function todayKey(){ return new Date().toDateString(); }
function claimDaily(){
  if(state.lastClaimDate === todayKey()) return;
  state.coins += 500;
  state.streak = Math.min(7, state.streak + 1);
  state.lastClaimDate = todayKey();
  toast("500 PC claimed for today");
  render();
}
function findProduct(id){ return PRODUCTS.find(p=>p.id===id); }

function go(view, extra){
  state.view = view;
  if(extra) Object.assign(state, extra);
  render();
}

function addToCart(id){
  const line = state.cart.find(c=>c.id===id);
  if(line) line.qty++; else state.cart.push({id, qty:1});
  render();
}
function removeFromCart(id){
  state.cart = state.cart.filter(c=>c.id!==id);
  render();
}
function cartTotal(){
  return state.cart.reduce((sum,c)=>sum + findProduct(c.id).price*c.qty, 0);
}

function placeOrder(){
  const total = cartTotal();
  if(total > state.coins || state.cart.length===0) return;
  state.coins -= total;
  const order = {
    id: "PB-" + Math.floor(1000+Math.random()*9000),
    items: state.cart.map(c=>({...findProduct(c.id), qty:c.qty})),
    total,
    stage: 0,
    placedAt: new Date(),
    delivered:false,
    nextEta: null
  };
  state.orders.unshift(order);
  state.cart = [];
  state.openOrder = order.id;
  state.view = "confirm";
  scheduleOrderProgress(order);
  render();
}

function getOrder(id){ return state.orders.find(o=>o.id===id); }

function scheduleOrderProgress(order){
  const stepDelay = ()=> 9000 + Math.random()*14000;
  function next(){
    if(order.stage >= STAGES.length-1) return;
    const delay = stepDelay();
    order.nextEta = Date.now() + delay;
    render();
    setTimeout(()=>{
      advanceStage(order.id);
      if(order.stage < STAGES.length-1) next();
    }, delay);
  }
  next();
}

function advanceStage(id){
  const o = getOrder(id);
  if(!o || o.stage >= STAGES.length-1) return;
  o.stage++;
  o.nextEta = null;
  if(o.stage === STAGES.length-1){
    o.delivered = true;
    o.items.forEach(it=>{
      state.vault.push({...it, orderId:o.id, cooling:0});
    });
  }
  render();
}

setInterval(()=>{ if(state.view==='tracking') render(); }, 1000);

function coolMore(vaultIdx){
  state.vault[vaultIdx].cooling = Math.min(100, state.vault[vaultIdx].cooling + 25);
  render();
}

function archiveVaultItem(vaultIdx, toReal){
  const item = state.vault[vaultIdx];
  if(toReal){
    const q = encodeURIComponent(item.name);
    window.open("https://www.amazon.com/s?k=" + q, "_blank");
  }
  state.vault.splice(vaultIdx,1);
  render();
}

function render(){
  document.querySelector('.phone').classList.toggle('onboarding', ['welcome','setpasscode','interests'].includes(state.view));
  document.getElementById('coinpillnum').textContent = fmt(state.coins);
  const cartCount = state.cart.reduce((s,c)=>s+c.qty,0);
  const cb = document.getElementById('cartbadge');
  cb.style.display = cartCount>0 ? 'block':'none'; cb.textContent = cartCount;
  const vb = document.getElementById('vaultbadge');
  vb.style.display = state.vault.length>0 ? 'block':'none'; vb.textContent = state.vault.length;
  document.querySelectorAll('.navitem').forEach(n=>{
    n.classList.toggle('active', n.dataset.v === (['home','product'].includes(state.view)?'home':state.view==='checkout'||state.view==='auth'||state.view==='confirm'||state.view==='tracking'?'cart':state.view));
  });

  const s = document.getElementById('screen');
  if(state.view==='welcome') s.innerHTML = viewWelcome();
  else if(state.view==='setpasscode') s.innerHTML = viewSetPasscode();
  else if(state.view==='interests') s.innerHTML = viewInterests();
  else if(state.view==='home') s.innerHTML = viewHome();
  else if(state.view==='product') s.innerHTML = viewProduct();
  else if(state.view==='cart') s.innerHTML = viewCart();
  else if(state.view==='checkout') s.innerHTML = viewCheckout();
  else if(state.view==='auth') s.innerHTML = viewAuth();

function pressSetupDigit(d){
  if(state.setupStage==='enter'){
    if(state.setupFirst.length>=4) return;
    state.setupFirst += d;
    render();
    if(state.setupFirst.length===4){
      setTimeout(()=>{ state.setupStage='confirm'; render(); }, 300);
    }
  } else {
    if(state.setupSecond.length>=4) return;
    state.setupSecond += d;
    render();
    if(state.setupSecond.length===4){
      if(state.setupSecond === state.setupFirst){
        state.userPasscode = state.setupFirst;
        setTimeout(()=>{ go('interests'); }, 400);
      } else {
        state.setupError = true;
        render();
        setTimeout(()=>{
          state.setupFirst=''; state.setupSecond=''; state.setupStage='enter'; state.setupError=false;
          render();
        }, 950);
      }
    }
  }
}
function backspaceSetupDigit(){
  if(state.setupStage==='enter') state.setupFirst = state.setupFirst.slice(0,-1);
  else state.setupSecond = state.setupSecond.slice(0,-1);

let toastTimer = null;
function toast(msg){
  let el = document.getElementById('toastEl');
  if(!el){
    el = document.createElement('div');
    el.id = 'toastEl';
    el.style.cssText = "position:absolute;left:18px;right:18px;bottom:90px;background:var(--ink);color:#fff;padding:11px 16px;border-radius:12px;font-size:12.5px;font-weight:600;text-align:center;z-index:20;box-shadow:0 8px 20px rgba(0,0,0,0.25);";
    document.querySelector('.phone').appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.opacity = "0"; }, 1400);
}

function pressDigit(d){
  if(state.verifying) return;
  if(state.passcodeInput.length>=4) return;
  state.passcodeInput += d;
  render();
  if(state.passcodeInput.length===4){
    state.verifying = true;
    render();
    setTimeout(()=>{
      if(!state.userPasscode || state.passcodeInput === state.userPasscode){
        state.authSuccess = true;
        render();
        setTimeout(()=>{ placeOrder(); }, 500);
      } else {
        state.authError = true;
        state.verifying = false;
        render();
        setTimeout(()=>{
          state.authError = false;
          state.passcodeInput = '';
          render();
        }, 900);
      }
    }, 650);
  }
}
function backspaceDigit(){
  if(state.verifying) return;
  state.passcodeInput = state.passcodeInput.slice(0,-1);
  render();
}
function simulateFingerprint(){
  if(state.verifying) return;
  state.verifying = true;
  render();
  setTimeout(()=>{
    state.authSuccess = true;
    render();
    setTimeout(()=>{ placeOrder(); }, 500);
  }, 1300);
}

    <circle cx="22" cy="22" r="${r}" fill="none" stroke="#00B4D8" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 22 22)"/>

}

    </div>
    <button class="btn ${state.lastClaimDate===todayKey() ? 'btn-ghost' : 'btn-mint'}" ${state.lastClaimDate===todayKey() ? 'disabled' : ''} onclick="claimDaily()">
      ${state.lastClaimDate===todayKey() ? "Claimed for today ✓ — come back tomorrow" : "Claim today's 500 PC"}
    </button>

    <div class="fieldrow"><span>Sync to real disposable income</span>
      <input type="checkbox" ${state.budgetSync?'checked':''} onchange="state.budgetSync=this.checked;render()">
    </div>
    <p class="sub" style="margin-top:2px;">When on, your daily Phantom Coin allowance is calibrated to feel like your real spending headroom — same tension, zero real risk.</p>
    ${state.budgetSync ? `
    <div class="fieldrow"><span>Simulated weekly budget</span><span id="budgetval" style="font-family:'IBM Plex Mono',monospace;">₩350,000</span></div>
    <input class="slider" type="range" min="100000" max="800000" step="10000" value="350000" oninput="document.getElementById('budgetval').textContent='₩'+Number(this.value).toLocaleString()">
    ` : ''}

    <div class="eyebrow" style="margin-top:24px;">Order History</div>
    ${state.orders.length===0 ? `<p class="sub">No orders yet.</p>` :
      state.orders.map(o=>`
        <div class="receipt" style="cursor:pointer;" onclick="go('tracking',{openOrder:'${o.id}'})">
          <div class="row">
            <div>
              <div style="font-weight:700;font-size:13px;">${o.id}</div>
              <div style="font-size:11.5px;color:var(--ink-soft);">${STAGES[o.stage]} · ${o.items.length} item${o.items.length>1?'s':''}</div>
            </div>
            <div class="pprice">${fmt(o.total)} PC</div>
          </div>
        </div>`).join('')}
    <div class="eyebrow" style="margin-top:26px;">About This Prototype</div>
    <p class="sub" style="font-size:12px;line-height:1.6;">Phantom Buy is a concept prototype for a behavioral-economics habit-substitution app.</p>
    <p class="sub" style="font-size:11.5px;line-height:1.65;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;"><strong style="color:var(--ink);">AI Disclosure:</strong> This prototype was built with Claude, Anthropic's AI model. No real transactions, accounts, or biometric data are collected — everything runs locally in your browser session.</p>
  `;
}

render();
</script>
</body>
</html>
